# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Claimio — Nginx Server Block
# Laravel 12 API + React SPA on the same domain
# Domain:  claimio.ddnsking.com
# Path:    /etc/nginx/sites-available/claimio
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Architecture:
#   /api/*        → PHP-FPM → Laravel  (root: /var/www/claimio/public)
#   /sanctum/*    → PHP-FPM → Laravel
#   /storage/*    → Static files via symlink (public/storage → storage/app/public)
#   /*            → React SPA           (root: /var/www/claimio/claimio-frontend/dist)
#
# Install:
#   sudo cp deployment/claimio.nginx.conf /etc/nginx/sites-available/claimio
#   sudo ln -sf /etc/nginx/sites-available/claimio /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d claimio.ddnsking.com
#   Certbot will automatically add the ssl_certificate / ssl_certificate_key
#   directives and the HTTP→HTTPS redirect block below.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ──────────────────────────────────────────────────────────
# HTTP → HTTPS redirect (added/managed by Certbot)
# ──────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name claimio.ddnsking.com;

    # Certbot ACME challenge (leave for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────
# HTTPS server — main block
# ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name claimio.ddnsking.com;

    # ── SSL certificates (managed by Certbot) ────────────
    ssl_certificate     /etc/letsencrypt/live/claimio.ddnsking.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claimio.ddnsking.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── General settings ─────────────────────────────────
    root   /var/www/claimio/public;
    index  index.php index.html;
    charset utf-8;

    # Max upload size (report images)
    client_max_body_size 20M;

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logging ──────────────────────────────────────────
    access_log /var/log/nginx/claimio_access.log;
    error_log  /var/log/nginx/claimio_error.log;

    # ══════════════════════════════════════════════════════
    #  PHP-FPM handler (shared by all Laravel routes)
    # ══════════════════════════════════════════════════════
    location ~ \.php$ {
        root /var/www/claimio/public;

        # Prevent execution of PHP files in uploads
        fastcgi_pass  unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include       fastcgi_params;

        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ══════════════════════════════════════════════════════
    #  Laravel API routes  →  /api/*
    # ══════════════════════════════════════════════════════
    location /api {
        root /var/www/claimio/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ══════════════════════════════════════════════════════
    #  Sanctum routes  →  /sanctum/*
    # ══════════════════════════════════════════════════════
    location /sanctum {
        root /var/www/claimio/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ══════════════════════════════════════════════════════
    #  Laravel health check  →  /up
    # ══════════════════════════════════════════════════════
    location = /up {
        root /var/www/claimio/public;
        try_files $uri /index.php?$query_string;
    }

    # ══════════════════════════════════════════════════════
    #  Storage files (symlink: public/storage → storage/app/public)
    #  In production with S3, most images are served from AWS.
    #  This location remains for any locally-stored files.
    # ══════════════════════════════════════════════════════
    location /storage {
        root /var/www/claimio/public;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ══════════════════════════════════════════════════════
    #  Deny dotfiles & sensitive files
    # ══════════════════════════════════════════════════════
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
    }

    # ══════════════════════════════════════════════════════
    #  React SPA — catch-all (MUST be last)
    #  Serves claimio-frontend/dist for all non-API routes.
    #  Client-side routing: any unknown path → index.html
    # ══════════════════════════════════════════════════════
    location / {
        root /var/www/claimio/claimio-frontend/dist;
        try_files $uri $uri/ /index.html;

        # Aggressive caching for hashed Vite build assets
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
            root /var/www/claimio/claimio-frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
